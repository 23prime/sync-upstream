name: Check JavaScript

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.js"
      - ".github/workflows/check-js.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.js"
      - ".github/workflows/check-js.yml"

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise and setup
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          install_args: "pnpm"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: mise run js-test
