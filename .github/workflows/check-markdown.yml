name: Check Markdown

on:
  push:
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown.yml"

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise and setup
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          install_args: "markdownlint-cli2"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          MISE_LOCKED: "1"

      - name: Fix
        run: mise run md-fix

      - name: Commit and Push
        uses: 23prime/simple-commit-and-push@15fb653b9591afde3bffb82a906a9af2aede1616 # v1.0.0
        with:
          commit-message: "Auto fix code by `mise run md-fix`"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check
        run: mise run md-check
