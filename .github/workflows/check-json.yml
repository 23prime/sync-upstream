name: Check JSON

on:
  push:
    paths:
      - "**/*.json"
      - ".github/workflows/check-json.yml"
  pull_request:
    paths:
      - "**/*.json"
      - ".github/workflows/check-json.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise and setup
        uses: jdx/mise-action@v4
        with:
          install: true
          install_args: "biome"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix
        run: mise run json-fix

      - name: Commit and Push
        uses: 23prime/simple-commit-and-push@v1
        with:
          commit-message: "Auto fix code by `mise run json-fix`"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check
        run: mise run json-check
